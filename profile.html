<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Любимка — Профиль</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
    }
    .page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 18px 36px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: #111827;
      margin-bottom: 20px;
    }
    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 12px 28px rgba(255, 107, 53, 0.18);
    }
    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .back-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #111827;
      font-size: 20px;
      flex-shrink: 0;
      background: #ffffff;
    }
    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .card {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    .profile-summary {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 28px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 999px;
      background: #FF6B35;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 14px;
      box-shadow: 0 18px 36px rgba(255, 107, 53, 0.26);
    }
    .profile-email {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: #6b7280;
      word-break: break-word;
    }
    .fields {
      display: grid;
      gap: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }
    .field input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      font: inherit;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field input:focus {
      border-color: #FF6B35;
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.14);
    }
    .actions {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    .button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }
    .button:disabled {
      opacity: 0.75;
      cursor: wait;
      transform: none;
    }
    .button-primary {
      background: #FF6B35;
      color: #ffffff;
      box-shadow: 0 16px 32px rgba(255, 107, 53, 0.22);
    }
    .button-secondary {
      background: #f3f4f6;
      color: #4b5563;
    }
    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }
    .loading-note {
      color: #6b7280;
      text-align: center;
      line-height: 1.7;
      padding: 24px 0;
    }
    @media (max-width: 480px) {
      .page { padding: 16px 14px 28px; }
      .brand-logo { width: 40px; height: 40px; }
      .brand-title { font-size: 22px; }
      .page-title { font-size: 25px; }
      .card { border-radius: 24px; padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="brand" href="index.html" aria-label="Любимка">
      <img class="brand-logo" src="assets/lubimka-logo.webp" alt="Логотип Любимка">
      <span class="brand-title">Любимка</span>
    </a>

    <div class="topbar">
      <a class="back-button" href="index.html" aria-label="Назад">←</a>
      <h1 class="page-title">Профиль</h1>
    </div>

    <section class="card">
      <div id="loading-note" class="loading-note">Загружаем профиль...</div>

      <form id="profile-form" hidden>
        <div class="profile-summary">
          <div id="avatar" class="avatar">Л</div>
          <p id="profile-email" class="profile-email">—</p>
        </div>

        <div class="fields">
          <div class="field">
            <label for="full-name">Имя</label>
            <input id="full-name" name="full_name" type="text" placeholder="Как к вам обращаться">
          </div>

          <div class="field">
            <label for="phone">Телефон</label>
            <input id="phone" name="phone" type="tel" placeholder="+7 (999) 123-45-67">
          </div>

          <div class="field">
            <label for="city">Город</label>
            <input id="city" name="city" type="text" placeholder="Например, Москва">
          </div>
        </div>

        <div class="actions">
          <button id="save-button" class="button button-primary" type="submit">Сохранить</button>
          <button id="logout-button" class="button button-secondary" type="button">Выйти</button>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const SUPABASE_URL = window.SUPABASE_URL || 'https://afnlrgfamcaxnnpqgxev.supabase.co';
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmxyZ2ZhbWNheG5ucHFneGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzAwMjQsImV4cCI6MjA5MTM0NjAyNH0.O9g34xXE0K4GKzaMN857wPEHMTUK8V5LnhLS_V0yhDw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const supabaseProjectRef = new URL(SUPABASE_URL).hostname.split('.')[0];
    const supabaseStorageKeyPrefix = `sb-${supabaseProjectRef}-`;
    const profileForm = document.getElementById('profile-form');
    const loadingNote = document.getElementById('loading-note');
    const emailNode = document.getElementById('profile-email');
    const avatarNode = document.getElementById('avatar');
    const statusNode = document.getElementById('status');
    const saveButton = document.getElementById('save-button');
    const logoutButton = document.getElementById('logout-button');
    const nameInput = document.getElementById('full-name');
    const phoneInput = document.getElementById('phone');
    const cityInput = document.getElementById('city');
    let currentUser = null;

    function clearStoredSupabaseSession() {
      [window.localStorage, window.sessionStorage].forEach((storage) => {
        if (!storage) return;

        const keys = [];
        for (let index = 0; index < storage.length; index += 1) {
          const key = storage.key(index);
          if (key) {
            keys.push(key);
          }
        }

        keys.forEach((key) => {
          if (key.startsWith(supabaseStorageKeyPrefix) && key.includes('auth-token')) {
            storage.removeItem(key);
          }
        });
      });
    }

    function redirectToAuth() {
      window.location.replace('/auth');
    }

    function setStatus(message, type = '') {
      statusNode.textContent = message;
      statusNode.className = `status ${type}`.trim();
    }

    function setLoadingState(isLoading, label = 'Сохраняем...') {
      saveButton.disabled = isLoading;
      saveButton.textContent = isLoading ? label : 'Сохранить';
    }

    function deriveAvatarLetter(user) {
      const source = (user?.email || user?.user_metadata?.full_name || 'Л').trim();
      return source.charAt(0).toUpperCase();
    }

    function getUserMetadata(user) {
      return user?.user_metadata && typeof user.user_metadata === 'object' ? user.user_metadata : {};
    }

    function populateProfile(user) {
      const metadata = getUserMetadata(user);
      emailNode.textContent = user.email || 'Email не указан';
      avatarNode.textContent = deriveAvatarLetter(user);
      nameInput.value = metadata.full_name || '';
      phoneInput.value = metadata.phone || '';
      cityInput.value = metadata.city || '';
      loadingNote.hidden = true;
      profileForm.hidden = false;
    }

    async function requireUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        redirectToAuth();
        return null;
      }

      currentUser = data.user;
      populateProfile(currentUser);
      return currentUser;
    }

    profileForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!currentUser) return;

      const metadata = getUserMetadata(currentUser);
      const fullName = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const city = cityInput.value.trim();

      setLoadingState(true);
      setStatus('Сохраняем изменения...');

      try {
        const { data, error } = await supabaseClient.auth.updateUser({
          data: {
            ...metadata,
            full_name: fullName,
            phone,
            city
          }
        });

        if (error) {
          setStatus(error.message || 'Не удалось сохранить профиль.', 'error');
          return;
        }

        currentUser = data.user || currentUser;
        populateProfile(currentUser);
        setStatus('Профиль сохранён.', 'success');
      } finally {
        setLoadingState(false);
      }
    });

    logoutButton.addEventListener('click', async () => {
      logoutButton.disabled = true;
      logoutButton.textContent = 'Выходим...';
      setStatus('Завершаем сеанс...');

      try {
        await supabaseClient.auth.signOut();
      } finally {
        clearStoredSupabaseSession();
        window.location.replace('/auth?logout=1');
      }
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session && event === 'SIGNED_OUT') {
        clearStoredSupabaseSession();
        redirectToAuth();
      }
    });

    requireUser();
  </script>
</body>
</html>
