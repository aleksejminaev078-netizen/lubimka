<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Любимка — Мои питомцы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
    }
    .page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: #111827;
      margin-bottom: 20px;
    }
    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 12px 28px rgba(255, 107, 53, 0.18);
    }
    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .back-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #111827;
      font-size: 20px;
      flex-shrink: 0;
      background: #ffffff;
    }
    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .section {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    .section-subtitle {
      margin: 6px 0 0;
      color: #6b7280;
      line-height: 1.6;
      font-size: 14px;
    }
    .button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }
    .button:disabled {
      opacity: 0.75;
      cursor: wait;
      transform: none;
    }
    .button-primary {
      background: #FF6B35;
      color: #ffffff;
      box-shadow: 0 16px 32px rgba(255, 107, 53, 0.22);
    }
    .button-secondary {
      background: #fff4ee;
      color: #FF6B35;
    }
    .button-full {
      width: 100%;
    }
    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }
    .loading-note {
      color: #6b7280;
      text-align: center;
      line-height: 1.7;
      padding: 28px 0;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 28px 10px 8px;
    }
    .empty-icon {
      font-size: 46px;
      line-height: 1;
      margin-bottom: 14px;
    }
    .empty-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
    }
    .empty-text {
      margin: 0 0 20px;
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
      max-width: 320px;
    }
    .pets-list {
      display: grid;
      gap: 14px;
    }
    .pet-card {
      border-radius: 22px;
      background: #fff8f4;
      border: 1px solid rgba(255, 107, 53, 0.12);
      padding: 18px;
    }
    .pet-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .pet-name {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: #111827;
    }
    .pet-type {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ffffff;
      color: #FF6B35;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(255, 107, 53, 0.12);
    }
    .pet-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .pet-detail {
      padding: 12px 14px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.05);
    }
    .pet-detail-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pet-detail-value {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      word-break: break-word;
    }
    .pet-notes {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.05);
    }
    .pet-notes p {
      margin: 8px 0 0;
      color: #374151;
      line-height: 1.6;
      font-size: 14px;
    }
    .form-panel {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid #f3f4f6;
      box-shadow: inset 0 0 0 1px rgba(255, 107, 53, 0.06);
    }
    .form-panel[hidden], .empty-state[hidden], .pets-list[hidden], .actions-row[hidden], .loading-note[hidden] {
      display: none !important;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }
    .field input,
    .field textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      font: inherit;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      resize: vertical;
      min-height: 54px;
    }
    .field textarea {
      min-height: 92px;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: #FF6B35;
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.14);
    }
    .form-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .form-actions,
    .actions-row {
      display: grid;
      gap: 10px;
    }
    @media (max-width: 520px) {
      .page { padding: 16px 14px 28px; }
      .brand-logo { width: 40px; height: 40px; }
      .brand-title { font-size: 22px; }
      .page-title { font-size: 25px; }
      .section { border-radius: 24px; padding: 18px; }
      .form-grid,
      .pet-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="brand" href="index.html" aria-label="Любимка">
      <img class="brand-logo" src="assets/lubimka-logo.webp" alt="Логотип Любимка">
      <span class="brand-title">Любимка</span>
    </a>

    <div class="topbar">
      <a class="back-button" href="index.html" aria-label="Назад">←</a>
      <h1 class="page-title">Мои питомцы</h1>
    </div>

    <section class="section">
      <div class="section-header">
        <div>
          <h2 class="section-title">Карточки питомцев</h2>
          <p class="section-subtitle">Все данные хранятся в вашем аккаунте и доступны после входа.</p>
        </div>
      </div>

      <div id="loading-note" class="loading-note">Загружаем список питомцев...</div>

      <form id="pet-form" class="form-panel" hidden>
        <div class="field">
          <label for="pet-name">Имя питомца</label>
          <input id="pet-name" name="name" type="text" placeholder="Например, Боня" required>
        </div>

        <div class="form-grid">
          <div class="field">
            <label for="pet-species">Вид</label>
            <input id="pet-species" name="species" type="text" placeholder="Кошка, собака, попугай" required>
          </div>

          <div class="field">
            <label for="pet-age">Возраст</label>
            <input id="pet-age" name="age" type="text" placeholder="2 года">
          </div>
        </div>

        <div class="field">
          <label for="pet-breed">Порода</label>
          <input id="pet-breed" name="breed" type="text" placeholder="Например, корги">
        </div>

        <div class="field">
          <label for="pet-notes">Заметки</label>
          <textarea id="pet-notes" name="notes" placeholder="Особенности, привычки, важная информация"></textarea>
        </div>

        <div class="form-actions">
          <button id="save-pet-button" class="button button-primary button-full" type="submit">Сохранить питомца</button>
          <button id="cancel-pet-button" class="button button-secondary button-full" type="button">Отмена</button>
        </div>
      </form>

      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-icon">🐾</div>
        <h2 class="empty-title">Пока нет питомцев</h2>
        <p class="empty-text">Добавьте первого любимца, и он появится в вашем личном списке.</p>
        <button id="empty-add-button" class="button button-primary" type="button">Добавить питомца</button>
      </div>

      <div id="actions-row" class="actions-row" hidden>
        <button id="header-add-button" class="button button-secondary button-full" type="button">Добавить питомца</button>
      </div>

      <div id="pets-list" class="pets-list" hidden></div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = window.SUPABASE_URL || 'https://afnlrgfamcaxnnpqgxev.supabase.co';
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmxyZ2ZhbWNheG5ucHFneGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzAwMjQsImV4cCI6MjA5MTM0NjAyNH0.O9g34xXE0K4GKzaMN857wPEHMTUK8V5LnhLS_V0yhDw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const supabaseProjectRef = new URL(SUPABASE_URL).hostname.split('.')[0];
    const supabaseStorageKeyPrefix = `sb-${supabaseProjectRef}-`;
    const loadingNote = document.getElementById('loading-note');
    const statusNode = document.getElementById('status');
    const petsListNode = document.getElementById('pets-list');
    const emptyStateNode = document.getElementById('empty-state');
    const petForm = document.getElementById('pet-form');
    const actionsRow = document.getElementById('actions-row');
    const emptyAddButton = document.getElementById('empty-add-button');
    const headerAddButton = document.getElementById('header-add-button');
    const cancelPetButton = document.getElementById('cancel-pet-button');
    const savePetButton = document.getElementById('save-pet-button');
    let currentUser = null;
    let pets = [];

    function clearStoredSupabaseSession() {
      [window.localStorage, window.sessionStorage].forEach((storage) => {
        if (!storage) return;

        const keys = [];
        for (let index = 0; index < storage.length; index += 1) {
          const key = storage.key(index);
          if (key) {
            keys.push(key);
          }
        }

        keys.forEach((key) => {
          if (key.startsWith(supabaseStorageKeyPrefix) && key.includes('auth-token')) {
            storage.removeItem(key);
          }
        });
      });
    }

    function redirectToAuth() {
      window.location.replace('auth.html');
    }

    function setStatus(message, type = '') {
      statusNode.textContent = message;
      statusNode.className = `status ${type}`.trim();
    }

    function getUserMetadata(user) {
      return user?.user_metadata && typeof user.user_metadata === 'object' ? user.user_metadata : {};
    }

    function normalizePets(rawPets) {
      if (!Array.isArray(rawPets)) return [];

      return rawPets
        .filter((pet) => pet && typeof pet === 'object')
        .map((pet, index) => ({
          id: pet.id || `${Date.now()}-${index}`,
          name: String(pet.name || '').trim(),
          species: String(pet.species || '').trim(),
          breed: String(pet.breed || '').trim(),
          age: String(pet.age || '').trim(),
          notes: String(pet.notes || '').trim(),
          created_at: pet.created_at || new Date().toISOString()
        }))
        .filter((pet) => pet.name && pet.species);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showForm() {
      petForm.hidden = false;
      emptyStateNode.hidden = true;
      petForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function hideForm(reset = false) {
      petForm.hidden = true;
      if (reset) {
        petForm.reset();
      }
    }

    function renderPets() {
      loadingNote.hidden = true;
      petsListNode.innerHTML = '';
      const hasPets = pets.length > 0;

      emptyStateNode.hidden = hasPets;
      petsListNode.hidden = !hasPets;
      actionsRow.hidden = !hasPets;

      if (!hasPets) {
        return;
      }

      const markup = pets
        .slice()
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .map((pet) => {
          const breedValue = pet.breed || 'Не указана';
          const ageValue = pet.age || 'Не указан';
          const notesBlock = pet.notes
            ? `<div class="pet-notes"><strong class="pet-detail-label">Заметки</strong><p>${escapeHtml(pet.notes)}</p></div>`
            : '';

          return `
            <article class="pet-card">
              <div class="pet-top">
                <div>
                  <h3 class="pet-name">${escapeHtml(pet.name)}</h3>
                </div>
                <span class="pet-type">${escapeHtml(pet.species)}</span>
              </div>
              <div class="pet-details">
                <div class="pet-detail">
                  <span class="pet-detail-label">Порода</span>
                  <span class="pet-detail-value">${escapeHtml(breedValue)}</span>
                </div>
                <div class="pet-detail">
                  <span class="pet-detail-label">Возраст</span>
                  <span class="pet-detail-value">${escapeHtml(ageValue)}</span>
                </div>
              </div>
              ${notesBlock}
            </article>
          `;
        })
        .join('');

      petsListNode.innerHTML = markup;
    }

    async function savePets(nextPets, successMessage) {
      if (!currentUser) return false;

      const metadata = getUserMetadata(currentUser);
      savePetButton.disabled = true;
      savePetButton.textContent = 'Сохраняем...';
      setStatus('Сохраняем питомца...');

      try {
        const { data, error } = await supabaseClient.auth.updateUser({
          data: {
            ...metadata,
            pets: nextPets
          }
        });

        if (error) {
          setStatus(error.message || 'Не удалось сохранить питомцев.', 'error');
          return false;
        }

        currentUser = data.user || currentUser;
        pets = normalizePets(getUserMetadata(currentUser).pets);
        renderPets();
        setStatus(successMessage, 'success');
        return true;
      } finally {
        savePetButton.disabled = false;
        savePetButton.textContent = 'Сохранить питомца';
      }
    }

    petForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(petForm);
      const newPet = {
        id: (window.crypto && window.crypto.randomUUID && window.crypto.randomUUID()) || `${Date.now()}`,
        name: String(formData.get('name') || '').trim(),
        species: String(formData.get('species') || '').trim(),
        breed: String(formData.get('breed') || '').trim(),
        age: String(formData.get('age') || '').trim(),
        notes: String(formData.get('notes') || '').trim(),
        created_at: new Date().toISOString()
      };

      if (!newPet.name || !newPet.species) {
        setStatus('Заполните имя и вид питомца.', 'error');
        return;
      }

      const nextPets = [...pets, newPet];
      const saved = await savePets(nextPets, 'Питомец добавлен.');

      if (saved) {
        petForm.reset();
        hideForm();
      }
    });

    emptyAddButton.addEventListener('click', () => {
      setStatus('');
      showForm();
    });

    headerAddButton.addEventListener('click', () => {
      setStatus('');
      showForm();
    });

    cancelPetButton.addEventListener('click', () => {
      petForm.reset();
      hideForm();
      renderPets();
      setStatus('');
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session && event === 'SIGNED_OUT') {
        clearStoredSupabaseSession();
        redirectToAuth();
      }
    });

    (async () => {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        redirectToAuth();
        return;
      }

      currentUser = data.user;
      pets = normalizePets(getUserMetadata(currentUser).pets);
      renderPets();
    })();
  </script>
</body>
</html>
